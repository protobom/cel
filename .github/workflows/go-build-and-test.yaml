name: build-and-test

on:
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
          persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'
        check-latest: true
        cache: false

    - name: Test
      run: |
        go get -d ./...
        go test -v ./...
